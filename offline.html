<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.V.S Rotselaar — Offline</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B1D3A">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0B1D3A;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            color: #E6EAF4;
        }

        .offline-card {
            background: #1C2338;
            border-radius: 20px;
            padding: 2.75rem 2.25rem 2rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
            border-top: 3px solid #0047AB;
        }

        .offline-logo {
            width: 80px; height: 80px;
            border-radius: 50%;
            margin: 0 auto 1.25rem;
            display: block;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }

        .offline-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            display: block;
            line-height: 1;
        }

        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.65);
            line-height: 1.65;
            margin-bottom: 1.75rem;
        }

        .retry-btn {
            display: inline-block;
            background: #0047AB;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.85rem 2rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 4px 14px rgba(0,71,171,0.4);
        }
        .retry-btn:hover {
            background: #003380;
            transform: translateY(-2px);
        }

        .cached-links {
            margin-top: 1.75rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .cached-links p {
            font-size: 0.78rem;
            margin-bottom: 0.75rem;
            color: rgba(255,255,255,0.38);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .cached-links a {
            display: inline-block;
            margin: 0.2rem;
            padding: 0.3rem 0.85rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.72);
            text-decoration: none;
            font-weight: 600;
            transition: background 0.15s, color 0.15s;
        }
        .cached-links a:hover {
            background: rgba(0,71,171,0.3);
            color: #fff;
            border-color: rgba(0,71,171,0.5);
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <img src="assets/logo.png" alt="VVS Rotselaar" class="offline-logo">
        <span class="offline-icon">📡</span>
        <h1>Je bent offline</h1>
        <p>Er is momenteel geen internetverbinding. Sommige pagina's zijn nog beschikbaar vanuit de cache.</p>
        <button class="retry-btn" onclick="window.location.reload()">↻ Opnieuw proberen</button>
        <div class="cached-links">
            <p>Mogelijk beschikbaar offline</p>
            <a href="/index.html">Home</a>
            <a href="/veteranen.html">Veteranen</a>
            <a href="/zaterdag.html">Zaterdag</a>
            <a href="/zondag.html">Zondag</a>
            <a href="/kalender.html">Kalender</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>
    <script>
        window.addEventListener('online', () => window.location.reload());
    </script>
</body>
</html>
